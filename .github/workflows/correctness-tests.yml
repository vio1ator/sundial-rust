name: Correctness Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy safetensors transformers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Generate RoPE reference data
        run: |
          python scripts/generate_reference.py \
            --output tests/reference_data/rope/ \
            --rope-only

      - name: Run RoPE correctness test
        run: |
          cargo test --lib model::rope::tests::test_rope_matches_python_reference -- --nocapture

      - name: Run unit tests for testing infrastructure
        run: |
          cargo test --lib testing::

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Build
        run: |
          cargo build --release

      - name: Run unit tests
        run: |
          cargo test --lib
